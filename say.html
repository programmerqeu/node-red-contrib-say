<script type="text/javascript">
	RED.nodes.registerType('say', {
		category: 'output',
		color: '#3FADB5',
		defaults: {
			name: {value: ''},
			text: {value: ''},
			voice: {value: ''},
			voiceString: {value: ''},
			speed: {value: 1.0 }
		},
		inputs: 1,
		outputs: 1,
		align: 'right',
		icon: 'bridge-dash.png',
		label: function () {
			return this.name || this.text || this._('say.paletteLabel');
		},
		oneditprepare: function() {
          const normalizePlatform = function(platform) {
            if (!platform || typeof platform !== "string") {
              return undefined;
            }
            const value = platform.toLowerCase();
            if (value === "darwin" || value === "macos" || value === "mac") {
              return "darwin";
            }
            if (value === "linux") {
              return "linux";
            }
            return undefined;
          };

          const detectRuntimePlatform = function() {
            const settings = RED && RED.settings ? RED.settings : {};
            const candidates = [
              settings.runtimeOS,
              settings.runtimePlatform,
              settings.platform,
              settings.os,
              settings.runtime && settings.runtime.os,
              settings.runtime && settings.runtime.platform,
              settings.env && settings.env.os,
              settings.env && settings.env.platform
            ];

            for (let i = 0; i < candidates.length; i += 1) {
              const normalized = normalizePlatform(candidates[i]);
              if (normalized) {
                return normalized;
              }
            }
            return undefined;
          };

          const applyVoicePresetFilter = function(runtimePlatform) {
            const $voiceSelect = $("#node-input-voice");
            const $groups = $voiceSelect.find("optgroup[data-platform]");

            if (!runtimePlatform) {
              $groups.show();
              return;
            }

            $groups.each(function() {
              const $group = $(this);
              const isMatch = $group.data("platform") === runtimePlatform;
              $group.toggle(isMatch);
            });

            // Keep an already-selected custom preset visible for backwards compatibility.
            const selectedValue = $voiceSelect.val();
            const $selectedOption = $voiceSelect.find('option[value="' + selectedValue + '"]');
            if ($selectedOption.length > 0) {
              $selectedOption.closest("optgroup[data-platform]").show();
            }
          };

          const settingsPlatform = detectRuntimePlatform();
          applyVoicePresetFilter(settingsPlatform);

          $.getJSON("say/platform")
            .done(function(response) {
              const apiPlatform = normalizePlatform(response && response.platform);
              if (apiPlatform) {
                applyVoicePresetFilter(apiPlatform);
              }
            });

          $("#node-input-voice").on("change", function(){
            let option = $("#node-input-voice").val();
            if(option == ":"){
              $("#field-voiceString").show();
            } else {
              $("#field-voiceString").hide();
            }
          });
          $("#node-input-voice").trigger("change");
        },
	});

</script>

<script type="text/x-red" data-template-name="say">
    <div class="form-row">
    	<label for="node-input-name"><i class="icon-edit"></i> <span data-i18n="say.label.name"></span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]say.placeholder.name">
	</div>
	<div class="form-row">
		<label for="node-input-text"><i class="icon-edit"></i> <span data-i18n="say.label.text"></span></label>
		<input type="text" id="node-input-text" data-i18n="[placeholder]say.placeholder.text">
    </div>
	<div class="form-row">
			<label for="node-input-voice"><i class="icon-user"></i> <span data-i18n="say.label.voice"></span></label>
			<select type="text" id="node-input-voice" style="width: 320px">
				<option value="" style="font-style: italic" data-i18n="say.voice.standard"></option>
				<option value=":" style="font-style: italic" data-i18n="say.voice.byString"></option>
				<optgroup label="Linux" data-i18n="[label]say.optgroup.linux" data-platform="linux">
					<option value="Alan" data-i18n="say.voice.alan"></option>
					<option value="Nick" data-i18n="say.voice.nick"></option>
					<option value="Roger" data-i18n="say.voice.roger"></option>
					<option value="Nina" data-i18n="say.voice.nina"></option>
					<option value="KAL" data-i18n="say.voice.kal"></option>
					<option value="SLT" data-i18n="say.voice.slt"></option>
				</optgroup>
				<optgroup label="macOS" data-i18n="[label]say.optgroup.macos" data-platform="darwin">
					<option value="Alex">Alex</option>
					<option value="Bruce">Bruce</option>
					<option value="Fred">Fred</option>
					<option value="Kathy">Kathy</option>
					<option value="Vicki">Vicki</option>
					<option value="Victoria">Victoria</option>
				</optgroup>
			</select>
	</div>
	<div class="form-row form-tips" id="say-voice-runtime-hint">
		<span data-i18n="say.hint.voiceRuntime"></span>
	</div>
	<div class="form-row" id="field-voiceString">
		<label for="node-input-voiceString"><i class="icon-edit"></i> <span data-i18n="say.label.voiceName"></span></label>
		<input type="text" id="node-input-voiceString" data-i18n="[placeholder]say.placeholder.voiceName">
	</div>
	<div class="form-row">
		<label for="node-input-speed"><i class="icon-edit"></i> <span data-i18n="say.label.speed"></span></label>
		<input type="number" id="node-input-speed" min="0.1" max="2" step="0.1">
	</div>
</script>

<script type="text/x-red" data-help-name="say">
	<p data-i18n="say.help.intro"></p>
	<h3 data-i18n="say.help.requirementsTitle"></h3>
	<ul>
		<li data-i18n="say.help.macos"></li>
		<li data-i18n="say.help.linux"></li>
		<li data-i18n="say.help.linuxEngine"></li>
		<li data-i18n="say.help.windows"></li>
	</ul>
	<p data-i18n="say.help.macosVoices"></p>
</script>
