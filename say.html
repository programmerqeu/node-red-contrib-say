<script type="text/javascript">
	RED.nodes.registerType('say', {
		category: 'output',
		color: '#3FADB5',
		defaults: {
			name: {value: ''},
			text: {value: ''},
			voice: {value: ''},
			voiceString: {value: ''},
			speed: {value: 1.0 }
		},
		inputs: 1,
		outputs: 1,
		align: 'right',
		icon: 'bridge-dash.png',
		label: function () {
			return this.name || this.text || this._('say.paletteLabel');
		},
		oneditprepare: function() {
          const languageStorageKey = "node-red-contrib-say.languageFilter";
          const normalizePlatform = function(platform) {
            if (!platform || typeof platform !== "string") {
              return undefined;
            }
            const value = platform.toLowerCase();
            if (value === "darwin" || value === "macos" || value === "mac") {
              return "darwin";
            }
            if (value === "linux") {
              return "linux";
            }
            return undefined;
          };

          const detectRuntimePlatform = function() {
            const settings = RED && RED.settings ? RED.settings : {};
            const candidates = [
              settings.runtimeOS,
              settings.runtimePlatform,
              settings.platform,
              settings.os,
              settings.runtime && settings.runtime.os,
              settings.runtime && settings.runtime.platform,
              settings.env && settings.env.os,
              settings.env && settings.env.platform
            ];

            for (let i = 0; i < candidates.length; i += 1) {
              const normalized = normalizePlatform(candidates[i]);
              if (normalized) {
                return normalized;
              }
            }
            return undefined;
          };

          const getPreferredLanguage = function() {
            try {
              return localStorage.getItem(languageStorageKey) || "__all__";
            } catch (_error) {
              return "__all__";
            }
          };

          const savePreferredLanguage = function(language) {
            try {
              localStorage.setItem(languageStorageKey, language || "__all__");
            } catch (_error) { }
          };

          const applyVoicePresetFilter = function(runtimePlatform, languageFilter) {
            const $voiceSelect = $("#node-input-voice");
            const $platformGroups = $voiceSelect.find("optgroup[data-platform]");
            const $voiceOptions = $voiceSelect.find("optgroup[data-platform] option");
            const selectedValue = $voiceSelect.val();
            const normalizedLanguage = languageFilter || "__all__";

            if (!runtimePlatform) {
              $platformGroups.show();
            } else {
              $platformGroups.each(function() {
                const $group = $(this);
                const isMatch = $group.data("platform") === runtimePlatform;
                $group.toggle(isMatch);
              });
            }

            $voiceOptions.each(function() {
              const $option = $(this);
              const optionLang = $option.data("lang");
              let visible = true;
              if (normalizedLanguage !== "__all__" && optionLang) {
                visible = optionLang === normalizedLanguage;
              }
              $option.toggle(visible);
            });

            $platformGroups.each(function() {
              const $group = $(this);
              if ($group.css("display") === "none") {
                return;
              }
              const hasVisibleOptions = $group.find("option:visible").length > 0;
              $group.toggle(hasVisibleOptions);
            });

            // Keep an already-selected preset visible for backwards compatibility.
            const $selectedOption = $voiceSelect.find('option[value="' + selectedValue + '"]');
            if ($selectedOption.length > 0) {
              $selectedOption.show();
              $selectedOption.closest("optgroup[data-platform]").show();
            }
          };

          const collectLanguages = function() {
            const seen = {};
            const values = [];
            $("#node-input-voice").find("option[data-lang]").each(function() {
              const language = $(this).data("lang");
              if (language && !seen[language]) {
                seen[language] = true;
                values.push(language);
              }
            });
            values.sort();
            return values;
          };

          const populateLanguageFilter = function(defaultLanguage) {
            const $languageSelect = $("#node-input-languageFilter");
            const languages = collectLanguages();
            $languageSelect.empty();
            $languageSelect.append(
              $('<option value="__all__" data-i18n="say.language.all"></option>')
            );
            languages.forEach(function(language) {
              $languageSelect.append(
                $('<option></option>').attr("value", language).text(language)
              );
            });
            if (languages.includes(defaultLanguage)) {
              $languageSelect.val(defaultLanguage);
            } else {
              $languageSelect.val("__all__");
            }
            RED.i18n.update($languageSelect);
          };

          let currentRuntimePlatform = detectRuntimePlatform();
          const preferredLanguage = getPreferredLanguage();
          populateLanguageFilter(preferredLanguage);
          applyVoicePresetFilter(currentRuntimePlatform, preferredLanguage);

          $.getJSON("say/platform")
            .done(function(response) {
              const apiPlatform = normalizePlatform(response && response.platform);
              if (apiPlatform) {
                currentRuntimePlatform = apiPlatform;
                applyVoicePresetFilter(currentRuntimePlatform, $("#node-input-languageFilter").val());
              }
            });

          $("#node-input-languageFilter").on("change", function() {
            const language = $("#node-input-languageFilter").val();
            savePreferredLanguage(language);
            applyVoicePresetFilter(currentRuntimePlatform, language);
          });

          $("#node-input-voice").on("change", function(){
            let option = $("#node-input-voice").val();
            if(option == ":"){
              $("#field-voiceString").show();
            } else {
              $("#field-voiceString").hide();
            }
          });
          $("#node-input-voice").trigger("change");
        },
	});

</script>
